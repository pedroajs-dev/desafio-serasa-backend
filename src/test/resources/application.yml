spring:
  datasource:
    url: jdbc:h2:mem:balancas-test-${random.uuid};DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true

server:
  port: 8080

stabilization:
  window-size: 15
  std-dev-threshold: 5.0
  consecutive-windows: 3
